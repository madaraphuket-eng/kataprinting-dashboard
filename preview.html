<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KATAPRINTING Dashboard</title>

  <style>
    body{
      margin:0;
      font-family:sans-serif;
      background:#0f172a;
      color:white;
      padding:20px;
    }

    h1{
      font-size:40px;
      margin-bottom:5px;
    }

    .sub{
      color:#94a3b8;
      margin-bottom:30px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      margin-bottom:30px;
    }

    .card{
      background:#1e293b;
      padding:25px;
      border-radius:25px;
    }

    .card p{
      color:#94a3b8;
      margin:0 0 10px;
    }

    .card h2{
      font-size:36px;
      margin:0;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:#1e293b;
      border-radius:25px;
      overflow:hidden;
    }

    th,td{
      padding:15px;
      border-bottom:1px solid #334155;
      text-align:left;
    }

    th{
      color:#94a3b8;
    }

    .btn{
      background:#10b981;
      color:black;
      border:none;
      padding:12px 20px;
      border-radius:15px;
      font-weight:bold;
      cursor:pointer;
      margin-bottom:20px;
    }

    input{
      padding:10px;
      border-radius:10px;
      border:none;
      margin-right:10px;
      margin-bottom:10px;
    }

    .delete{
      background:#ef4444;
      color:white;
      border:none;
      padding:8px 12px;
      border-radius:10px;
      cursor:pointer;
    }
  </style>
</head>

<body>

  <h1>KATAPRINTING</h1>
  <div class="sub">Commission Dashboard</div>

  <div class="grid">
    <div class="card">
      <p>ยอดขายรวม</p>
      <h2 id="sales">0</h2>
    </div>

    <div class="card">
      <p>ค่าคอม 7%</p>
      <h2 id="commission">0</h2>
    </div>

    <div class="card">
      <p>จำนวนที่ขาย</p>
      <h2 id="items">0</h2>
    </div>
  </div>

  <input type="text" id="date" placeholder="วันที่">
  <input type="text" id="size" placeholder="ขนาด">
  <input type="number" id="price" placeholder="ราคา">
  <input type="number" id="qty" placeholder="จำนวน">

  <button class="btn" onclick="addOrder()">+ เพิ่มออเดอร์</button>

  <table>
    <thead>
      <tr>
        <th>วันที่</th>
        <th>ขนาด</th>
        <th>ราคา</th>
        <th>จำนวน</th>
        <th>ยอดขาย</th>
        <th>ค่าคอม</th>
        <th>ลบ</th>
      </tr>
    </thead>

    <tbody id="tableBody"></tbody>
  </table>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || [
  ["1-5-69","28×145",3890,1],
  ["7-5-69","20×63",2490,2],
];

function render(){

  let totalSales = 0;
  let totalItems = 0;

  const table = document.getElementById("tableBody");
  table.innerHTML = "";

  orders.forEach((o,index)=>{

    const total = o[2] * o[3];
    const commission = total * 0.07;

    totalSales += total;
    totalItems += o[3];

    table.innerHTML += `
      <tr>
        <td>${o[0]}</td>
        <td>${o[1]}</td>
        <td>฿${o[2].toLocaleString()}</td>
        <td>${o[3]}</td>
        <td>฿${total.toLocaleString()}</td>
        <td>฿${commission.toFixed(2)}</td>
        <td>
          <button class="delete" onclick="deleteOrder(${index})">
            ลบ
          </button>
        </td>
      </tr>
    `;
  });

  document.getElementById("sales").innerText =
    "฿" + totalSales.toLocaleString();

  document.getElementById("commission").innerText =
    "฿" + (totalSales * 0.07).toFixed(2);

  document.getElementById("items").innerText =
    totalItems + " ชิ้น";

  localStorage.setItem("orders",JSON.stringify(orders));
}

function addOrder(){

  const date = document.getElementById("date").value;
  const size = document.getElementById("size").value;
  const price = Number(document.getElementById("price").value);
  const qty = Number(document.getElementById("qty").value);

  if(!date || !size || !price || !qty){
    return;
  }

  orders.unshift([date,size,price,qty]);

  render();

  document.getElementById("date").value = "";
  document.getElementById("size").value = "";
  document.getElementById("price").value = "";
  document.getElementById("qty").value = "";
}

function deleteOrder(index){
  orders.splice(index,1);
  render();
}

render();

</script>

</body>
</html>
